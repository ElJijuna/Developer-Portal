<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer orbit ring -->
  <circle cx="32" cy="32" r="26" stroke="#3584e4" stroke-width="1" stroke-dasharray="4 3" opacity="0.35"/>

  <!-- Connecting lines -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#3584e4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="38" x2="48" y2="47" stroke="#26a269" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="38" x2="16" y2="47" stroke="#9141ac" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Center node -->
  <circle cx="32" cy="32" r="13" fill="#3584e4"/>
  <circle cx="32" cy="32" r="13" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Code symbol -->
  <text x="32" y="37" text-anchor="middle" font-size="12" font-weight="700" font-family="monospace" fill="white" opacity="0.95">&lt;/&gt;</text>

  <!-- Top satellite -->
  <circle cx="32" cy="7" r="5.5" fill="#26a269"/>
  <circle cx="32" cy="7" r="5.5" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Bottom-right satellite -->
  <circle cx="51" cy="50" r="5.5" fill="#9141ac"/>
  <circle cx="51" cy="50" r="5.5" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Bottom-left satellite -->
  <circle cx="13" cy="50" r="5.5" fill="#e66100"/>
  <circle cx="13" cy="50" r="5.5" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
